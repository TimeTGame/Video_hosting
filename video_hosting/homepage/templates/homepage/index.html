{% extends "base.html" %}
{% load static %}

{% block title %}Главная{% endblock %}

{% block content %}
  <div class="container-fluid px-4">

    <div class="d-flex gap-2 overflow-auto pb-3 mb-3" style="white-space: nowrap;">
        <button class="btn btn-light rounded-pill px-3 fw-bold">Все</button>
        <button class="btn btn-dark rounded-pill px-3 border border-secondary">Музыка</button>
        <button class="btn btn-dark rounded-pill px-3 border border-secondary">Игры</button>
        <button class="btn btn-dark rounded-pill px-3 border border-secondary">Программирование</button>
        <button class="btn btn-dark rounded-pill px-3 border border-secondary">Новости</button>
        <button class="btn btn-dark rounded-pill px-3 border border-secondary">Спорт</button>
        <button class="btn btn-dark rounded-pill px-3 border border-secondary">Кулинария</button>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 g-4">

      {% for video in videos %}
        {% include "videos/includes/video_card.html" with item=video %}
      {% endfor %}
    </div>
  </div>
{% endblock %}
